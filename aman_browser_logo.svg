<svg width="100%" viewBox="0 0 680 285" role="img" xmlns="http://www.w3.org/2000/svg" style=""><defs><mask id="imagine-text-gaps-38buoo" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="285" fill="white"/><rect x="298.0703125" y="174" width="83.859375" height="82" fill="black" rx="2"/><rect x="260.15625" y="244" width="159.6875" height="16" fill="black" rx="2"/></mask></defs>
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">أمان – Aman Browser logo</title>
